rules:
  - rule_id: EVAL-AUTH-001
    domain: auth
    status: approved
    owner: eval
    severity: critical
    scope:
      modules:
        - "src/auth/**"
    intent: "Auth remains identity-only."
    invariants:
      - id: EVAL-AUTH-001
        type: layer_boundary
        description: "Auth must not import billing."
        from: "src/auth/**"
        to: "src/billing/**"
    enforcement:
      mode: block
    source:
      file: "CLAUDE.md"
      section: "authentication-module"
