rules:
  - rule_id: EVAL-AUTH-001
    domain: auth
    status: approved
    owner: eval
    severity: critical
    scope:
      modules:
        - "src/auth/**"
    intent: "Auth remains identity-only."
    invariants:
      - id: EVAL-AUTH-001
        type: layer_boundary
        description: "Auth must not import billing implementation modules."
        from: "src/auth/**"
        to: "src/billing/**"
    enforcement:
      mode: block
    source:
      file: "CLAUDE.md"
      section: "authentication-module"

  - rule_id: EVAL-REPORTS-001
    domain: reporting
    status: approved
    owner: eval
    severity: warning
    scope:
      modules:
        - "src/reports/**"
    intent: "Read-only reporting code must not mutate state."
    invariants:
      - id: EVAL-REPORTS-001
        type: forbidden_side_effect
        description: "Read-only report functions must not perform write-like calls."
        readonly: true
        functions:
          - readOnlySummary
    enforcement:
      mode: review
    source:
      file: "CLAUDE.md"
      section: "read-only-reports"

  - rule_id: EVAL-BILLING-001
    domain: billing
    status: approved
    owner: eval
    severity: critical
    scope:
      modules:
        - "src/billing/**"
    intent: "Billing discounts preserve approved revenue guardrails."
    invariants:
      - id: EVAL-BILLING-001
        type: value_invariant
        description: "Discount must not exceed 30."
        value:
          symbol: discount
          max: 30
          operator: "<="
    enforcement:
      mode: block
    source:
      file: "CLAUDE.md"
      section: "billing-discounts"
